global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']

  - job_name: 'yokai-agent'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['localhost:7474']

  - job_name: 'dcgm'
    static_configs:
      - targets: ['localhost:9400']